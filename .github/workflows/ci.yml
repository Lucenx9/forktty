name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev desktop-file-utils rpm

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check src/

      - name: ESLint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Frontend build (also required by tauri::generate_context!)
        run: npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo audit
        run: cargo install cargo-audit --locked && cargo audit --file src-tauri/Cargo.lock

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Tauri bundle
        run: npm run tauri:build

      - name: Validate desktop entry
        run: desktop-file-validate src-tauri/target/release/bundle/appimage/ForkTTY.AppDir/ForkTTY.desktop

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
